<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Supply — Supplier Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --topbar:#1a1a1a; --sidebar:#f7f7f7; --content:#f1f1f1; --surface:#ffffff;
  --card-border:#e3e3e3; --hairline:#f1f1f1; --text:#303030; --heading:#1a1a1a;
  --subdued:#616161; --muted:#919191; --blue:#005bd3; --focus:rgba(0,91,211,0.15);
  --input-border:#d4d4d4; --green:#36a569; --green-text:#1f7a3f; --red:#d72c0d;
  --badge-blue-bg:#e4edff; --badge-blue-text:#1f5199; --badge-green-bg:#e4f5e9; --badge-green-text:#1f7a3f;
  --badge-yellow-bg:#fff5e1; --badge-yellow-text:#9e6c00; --badge-grey-bg:#ebebeb; --badge-grey-text:#616161;
  --avatar:#50B498; --selected-row:#eaf3ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;color:var(--text);background:var(--content);-webkit-font-smoothing:antialiased}
.tabular{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
a{color:var(--blue);text-decoration:none}

/* ===== CHROME ===== */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--topbar);display:flex;align-items:center;padding:0 16px;z-index:100;gap:16px}
.topbar-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-logo .mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#d4af37,#b8860b);display:flex;align-items:center;justify-content:center;font-size:14px;color:#1a1a1a;font-weight:700}
.topbar-search{flex:1;max-width:480px;margin:0 auto;position:relative}
.topbar-search input{width:100%;height:32px;background:#303030;border:1px solid #444;border-radius:8px;color:#e3e3e3;padding:0 12px 0 34px;font-size:13px;cursor:pointer}
.topbar-search input::placeholder{color:#9a9a9a}
.topbar-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.7;pointer-events:none}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-icon-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative}
.topbar-icon-btn:hover{background:#303030}
.notif-dot{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--green);border:1.5px solid var(--topbar)}
.store-switcher{display:flex;align-items:center;gap:8px;background:#303030;border-radius:8px;height:32px;padding:0 8px 0 6px}
.store-switcher:hover{background:#3d3d3d}
.store-avatar{width:22px;height:22px;border-radius:6px;background:var(--avatar);color:#08231b;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center}
.store-name{color:#e3e3e3;font-size:13px;font-weight:500}

.savebar{position:fixed;top:0;left:0;right:0;height:56px;background:#1a1a1a;z-index:130;display:none;align-items:center;padding:0 16px}
.savebar.active{display:flex}
.savebar-status{display:flex;align-items:center;gap:8px;color:#e3e3e3;font-size:13px;font-weight:500;margin:0 auto;padding-left:120px}
.savebar-actions{display:flex;gap:8px;align-items:center}
.savebar-discard{background:transparent;border:1px solid #616161;color:#e3e3e3;height:32px;border-radius:8px;padding:0 14px;font-weight:600;font-size:13px}
.savebar-discard:hover{background:#303030}
.savebar-save{background:#404040;color:#8a8a8a;height:32px;border-radius:8px;padding:0 14px;font-weight:600;font-size:13px;cursor:not-allowed}
.savebar-save.enabled{background:var(--green);color:#fff;cursor:pointer}
.savebar-save.enabled:hover{background:#2e9059}

.sidebar{position:fixed;top:56px;left:0;bottom:0;width:240px;background:var(--sidebar);border-right:1px solid var(--card-border);overflow-y:auto;padding:8px 12px;z-index:90}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;color:var(--text);font-size:13px;font-weight:500;margin-bottom:1px;cursor:pointer;position:relative}
.nav-item:hover{background:#ededed}
.nav-item.dimmed{color:var(--muted)}
.nav-item.dimmed svg{opacity:.5}
.nav-item.active{background:#e3e3e3;font-weight:600;color:var(--heading)}
.nav-item svg{flex-shrink:0}
.nav-count{margin-left:auto;background:#e3e3e3;color:var(--subdued);font-size:11px;font-weight:600;border-radius:8px;padding:1px 7px}
.nav-item.active .nav-count{background:#d4d4d4}
.nav-sub{padding-left:40px;font-weight:500;color:var(--subdued)}
.nav-sub.active{background:#e3e3e3;color:var(--heading);font-weight:600}
.nav-section-label{font-size:11px;font-weight:600;color:var(--muted);padding:14px 8px 4px}
.nav-divider{height:1px;background:var(--card-border);margin:8px 4px}

.main{position:fixed;top:56px;left:240px;right:0;bottom:0;overflow-y:auto;background:var(--content)}
.admin-content{max-width:1100px;margin:0 auto;padding:20px 32px 90px}
.page-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:18px}
.page-back{width:30px;height:30px;border-radius:8px;border:1px solid var(--card-border);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.page-back:hover{background:#fafafa}
.page-title{font-size:20px;font-weight:700;color:var(--heading);display:flex;align-items:center;gap:10px}
.page-subtitle{font-size:13px;color:var(--subdued);margin-top:3px;max-width:640px}
.page-title-wrap{flex:1}
.page-header-actions{display:flex;gap:8px;flex-shrink:0}

.layout-2col{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
@media(max-width:1000px){.layout-2col{grid-template-columns:1fr}}

/* ===== CARD ===== */
.p-card{background:var(--surface);border:1px solid var(--card-border);border-radius:12px;margin-bottom:16px}
.p-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0}
.p-card-title{font-size:14px;font-weight:600;color:var(--heading)}
.p-card-section{padding:16px 20px}
.p-card-section + .p-card-section{border-top:1px solid var(--hairline)}
.p-card-foot{padding:12px 16px;border-top:1px solid var(--hairline);display:flex;justify-content:center;align-items:center;gap:6px}

/* ===== BUTTONS ===== */
.btn{height:36px;border-radius:8px;padding:0 14px;font-size:13px;font-weight:600;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap}
.btn-sm{height:30px;padding:0 11px;font-size:12px}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:hover{background:var(--heading)}
.btn-primary:disabled{background:#b5b5b5;cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid #c9cccf}
.btn-secondary:hover{background:#f7f7f7}
.btn-secondary:disabled{color:#b5b5b5;cursor:not-allowed}
.btn-plain{background:transparent;color:var(--blue);font-weight:600;padding:0 4px;height:auto}
.btn-plain:hover{text-decoration:underline}
.btn-critical{background:var(--surface);color:var(--red);border:1px solid #e0a9a0}
.btn-critical:hover{background:#fff5f3}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:10px;padding:2px 9px;font-size:11px;font-weight:600;line-height:1.6}
.badge-green{background:var(--badge-green-bg);color:var(--badge-green-text)}
.badge-yellow{background:var(--badge-yellow-bg);color:var(--badge-yellow-text)}
.badge-blue{background:var(--badge-blue-bg);color:var(--badge-blue-text)}
.badge-grey{background:var(--badge-grey-bg);color:var(--badge-grey-text)}
.badge .dot{width:7px;height:7px;border-radius:50%}
.badge-green .dot{background:var(--green)}
.badge-yellow .dot{background:#e0a000}
.badge-grey .dot{background:#919191}
button.badge{border:none}

/* ===== FORM ===== */
label.field-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
label.field-label .req{color:var(--red);margin-left:2px}
.field-hint{font-size:12px;color:var(--subdued);margin-top:4px}
.input,.select,.textarea{width:100%;border:1px solid var(--input-border);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);background:#fff}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--focus)}
.textarea{resize:vertical;min-height:72px}
.select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 20 20' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 8l4 4 4-4' stroke='%23616161' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:30px}
.input-search{position:relative}
.input-search input{padding-left:34px}
.input-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
.input-prefix{position:relative}
.input-prefix .prefix{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--subdued);font-size:13px;pointer-events:none}
.input-prefix .suffix{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--subdued);font-size:13px;pointer-events:none}
.input-prefix input{padding-left:24px}
.input-prefix.has-suffix input{padding-right:28px}

/* segmented (Polaris ButtonGroup segmented) */
.seg{display:inline-flex;border:1px solid var(--input-border);border-radius:8px;overflow:hidden}
.seg button{height:32px;padding:0 12px;background:#fff;font-size:12px;font-weight:600;color:var(--subdued);border-right:1px solid var(--input-border)}
.seg button:last-child{border-right:none}
.seg button.active{background:#f1f1f1;color:var(--heading)}

/* checkbox (Polaris) */
.cbx{width:18px;height:18px;border:1.5px solid #8a8a8a;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;background:#fff;cursor:pointer;flex-shrink:0;transition:all .12s}
.cbx svg{display:none}
.cbx.checked,.cbx.partial{background:var(--blue);border-color:var(--blue)}
.cbx.checked svg,.cbx.partial svg{display:block}

/* ===== INDEX TABLE ===== */
.p-table{width:100%;border-collapse:collapse}
.p-table th{text-align:left;font-size:12px;font-weight:600;color:var(--subdued);padding:10px 12px;border-bottom:1px solid var(--card-border);white-space:nowrap}
.p-table td{padding:11px 12px;border-bottom:1px solid var(--hairline);font-size:13px;vertical-align:middle}
.p-table tr:last-child td{border-bottom:none}
.p-table tbody tr.row-hover{cursor:pointer}
.p-table tbody tr.row-hover:hover{background:#fafafa}
.p-table tbody tr.selected{background:var(--selected-row)}
.p-table tbody tr.selected:hover{background:#e0eeff}
.col-check{width:20px;padding-right:0}
.cell-right{text-align:right}
.cell-center{text-align:center}
.sortable{cursor:pointer;user-select:none}
.sortable:hover{color:var(--text)}
.sort-ind{display:inline-flex;vertical-align:middle;margin-left:4px;opacity:.5}
.sortable.active{color:var(--heading)}
.sortable.active .sort-ind{opacity:1}
.prod-cell{display:flex;align-items:center;gap:12px}
.prod-thumb{width:40px;height:40px;border-radius:8px;border:1px solid var(--card-border);object-fit:cover;background:#faf7ef;flex-shrink:0}
.prod-thumb-lg{width:120px;height:120px;border-radius:12px}
.prod-thumb-empty{width:40px;height:40px;border-radius:8px;border:1px dashed #d4d4d4;display:flex;align-items:center;justify-content:center;color:#bbb;flex-shrink:0}
.prod-thumb-empty.lg{width:120px;height:120px;border-radius:12px}
.prod-title{font-weight:500;color:var(--heading);line-height:1.3}
.prod-title.link:hover{color:var(--blue);text-decoration:underline}
.prod-meta{font-size:12px;color:var(--subdued);margin-top:2px}
.price-blue{color:var(--blue);font-weight:600}
.cost-muted{color:var(--subdued)}
.margin-pos{color:var(--green-text);font-weight:600}
.icon-btn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center}
.icon-btn:hover{background:#f1f1f1}

/* bulk action bar */
.bulk-bar{display:flex;align-items:center;gap:12px;background:#f6f6f7;border:1px solid var(--card-border);border-radius:10px;padding:8px 12px;margin-bottom:12px}
.bulk-count{font-weight:600;color:var(--heading);font-size:13px}
.bulk-actions{display:flex;gap:6px;margin-left:auto}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--card-border);padding:6px 8px}
.tab{padding:6px 8px;border-radius:8px;font-size:13px;font-weight:500;color:var(--subdued);display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text);background:#f1f1f1}
.tab.active{color:var(--heading);font-weight:600;background:#ebebeb}

/* stat tiles */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--surface);border:1px solid var(--card-border);border-radius:12px;padding:16px;text-align:left}
.stat-card.clickable{cursor:pointer;transition:border-color .12s}
.stat-card.clickable:hover{border-color:#c9cccf}
.stat-label{font-size:12px;color:var(--subdued);font-weight:500}
.stat-value{font-size:24px;font-weight:700;color:var(--heading);margin-top:8px;line-height:1}
.stat-sub{font-size:12px;color:var(--subdued);margin-top:6px}

/* banner */
.banner{border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;border:1px solid}
.banner-info{background:#f0f6ff;border-color:#b6d4fe}
.banner-success{background:#f0faf4;border-color:#aedcc0}
.banner-warning{background:#fff8ec;border-color:#f2d28a}
.banner .ico{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.banner .txt{flex:1}
.banner .ttl{font-weight:600;font-size:13px}
.banner-info .ttl{color:#1f5199}
.banner-success .ttl{color:#1f7a3f}
.banner-warning .ttl{color:#9e6c00}
.banner .sub{font-size:12px;margin-top:2px;color:var(--subdued)}

/* log list */
.log-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--hairline)}
.log-row:last-child{border-bottom:none}
.log-ico{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.log-ico.ok{background:var(--badge-green-bg)}
.log-ico.warn{background:var(--badge-yellow-bg)}
.log-ico.err{background:#fde7e2}
.log-main{flex:1}
.log-title{font-size:13px;font-weight:500;color:var(--heading)}
.log-meta{font-size:12px;color:var(--subdued);margin-top:2px}
.log-time{font-size:12px;color:var(--muted);white-space:nowrap}

/* empty state */
.empty-state{text-align:center;padding:44px 24px}
.empty-state .ico{width:56px;height:56px;border-radius:14px;background:#f1f1f1;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-state h3{font-size:15px;font-weight:600;color:var(--heading);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--subdued);max-width:380px;margin:0 auto 16px}

/* rule rows */
.rule-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--card-border);border-radius:10px;margin-bottom:10px}
.rule-scope{flex:1}
.rule-scope .scope-name{font-weight:600;color:var(--heading)}
.rule-scope .scope-meta{font-size:12px;color:var(--subdued);margin-top:2px}
.rule-controls{display:flex;align-items:center;gap:8px}

/* connection card */
.conn-card{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--card-border);border-radius:10px}
.conn-logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#d4af37,#9a7209);display:flex;align-items:center;justify-content:center;color:#1a1a1a;font-weight:700;font-size:15px;flex-shrink:0}
.conn-logo.alt{background:linear-gradient(135deg,#6a7bd4,#3a4ba0);color:#fff}
.conn-info{flex:1}
.conn-name{font-weight:600;color:var(--heading);font-size:14px;display:flex;align-items:center;gap:8px}
.conn-meta{font-size:12px;color:var(--subdued);margin-top:3px}
.conn-add{border:1px dashed #c9cccf;border-radius:10px;padding:16px;display:flex;align-items:center;gap:14px;background:#fafafa}
.conn-add:hover{background:#f3f3f3;cursor:pointer}
.conn-add .conn-logo{background:#ececec;color:#aaa}

/* description list / kv */
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--hairline);font-size:13px;gap:16px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--subdued)}
.kv .v{color:var(--heading);font-weight:500;text-align:right}

/* setting toggle (Polaris SettingToggle) */
.setting-toggle{display:flex;align-items:center;gap:16px}
.setting-toggle .st-text{flex:1}
.setting-toggle .st-text .st-title{font-weight:600;color:var(--heading);display:flex;align-items:center;gap:8px}
.setting-toggle .st-text .st-desc{font-size:12px;color:var(--subdued);margin-top:3px}

/* ===== MODAL ===== */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;animation:fadeIn .15s ease}
.modal-backdrop.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:620px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .18s ease;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal-lg{max-width:820px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--card-border);flex-shrink:0}
.modal-title{font-size:16px;font-weight:700;color:var(--heading)}
.modal-close{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--subdued)}
.modal-close:hover{background:#f1f1f1}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 20px;border-top:1px solid var(--card-border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.modal-foot .right{display:flex;gap:8px;margin-left:auto}

/* resource picker */
.rp-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.rp-head{display:grid;grid-template-columns:28px 1fr 100px 110px;gap:8px;padding:8px 12px;border-bottom:1px solid var(--card-border);font-size:12px;font-weight:600;color:var(--subdued)}
.rp-row{display:grid;grid-template-columns:28px 1fr 100px 110px;gap:8px;padding:10px 12px;align-items:center;border-bottom:1px solid var(--hairline);cursor:pointer}
.rp-row:hover{background:#fafafa}
.rp-row.sel{background:var(--selected-row)}
.rp-prod{display:flex;align-items:center;gap:10px}

/* popover (Polaris Popover + ActionList) */
.popover{position:fixed;background:#fff;border:1px solid var(--card-border);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.16);padding:6px;z-index:400;min-width:190px;animation:popIn .12s ease}
.action-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:8px 10px;border-radius:7px;font-size:13px;color:var(--text);font-weight:500}
.action-item:hover{background:#f1f1f1}
.action-item.destructive{color:var(--red)}
.action-item.destructive:hover{background:#fff5f3}
.action-item svg{flex-shrink:0;opacity:.8}
.action-item.checked-item{justify-content:space-between}
.popover-divider{height:1px;background:var(--hairline);margin:5px 4px}
.popover-label{font-size:11px;font-weight:600;color:var(--muted);padding:6px 10px 4px}

/* toast */
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{padding:11px 16px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.18);animation:slideUpToast .25s ease;display:flex;align-items:center;gap:9px;max-width:440px}
.toast-success{background:#1a1a1a}
.toast-error{background:var(--red)}
.toast-info{background:#1a1a1a}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== MARGIN MODEL ===== */
function effectiveMargin(p){
  if(p.override) return {type:p.mType, val:p.mVal, source:'Custom override'};
  const cr=state.categoryRules.find(r=>r.cat===p.category);
  if(cr) return {type:cr.type, val:cr.val, source:p.category+' category rule'};
  return {type:state.globalMargin.type, val:state.globalMargin.val, source:'Global default'};
}
function priceFrom(cost,type,val){ return type==='pct'? cost*(1+val/100) : cost+val; }
function finalPrice(p){ const m=effectiveMargin(p); return priceFrom(p.cost,m.type,m.val); }
function marginAmount(p){ return finalPrice(p)-p.cost; }
function marginLabel(p){ const m=effectiveMargin(p); return m.type==='pct'? '+'+m.val+'%' : '+'+fmt(m.val); }

/* ===== SAVE BAR ===== */
function setDirty(on,text){
  state.dirty=on;
  $('#savebar').classList.toggle('active',on);
  const save=$('#savebarSave');
  if(on){ save.classList.add('enabled'); $('#savebarText').textContent=text||'Unsaved changes'; }
  else{ save.classList.remove('enabled'); }
}
window.setDirty=setDirty;
window.saveChanges=function(){ setDirty(false); showToast('Changes saved','success'); render(); };
window.discardChanges=function(){
  if(state.view==='margins' && snapshots.margins) revertMargins();
  if(state.view==='settings' && snapshots.settings) state.settings=JSON.parse(snapshots.settings);
  setDirty(false); showToast('Changes discarded','info'); render();
};
function revertMargins(){
  const s=JSON.parse(snapshots.margins);
  state.globalMargin=s.g; state.categoryRules=s.c;
  s.p.forEach(sp=>{ const p=PRODUCTS.find(x=>x.id===sp.id); if(p){p.override=sp.o;p.mType=sp.t;p.mVal=sp.v;} });
}

/* ===== NAV ===== */
window.go=function(view){
  closePopover();
  state.view=view; state.activeProduct=null;
  if(state.dirty) setDirty(false);
  if(view==='margins') snapMargins();
  if(view==='settings') snapshots.settings=JSON.stringify(state.settings);
  setNav(view);
  render(); $('.main').scrollTop=0;
};
function setNav(view){
  $$('.nav-item').forEach(n=>n.classList.remove('active'));
  const map={overview:'#navOverview',catalog:'#navCatalog',product:'#navCatalog',margins:'#navMargins',suppliers:'#navSuppliers',activity:'#navActivity',settings:'#navSettings'};
  const el=$(map[view]); if(el) el.classList.add('active');
}
window.dimClick=function(name){ closePopover(); showToast(name+' lives in the Shopify admin — outside this app','info'); };

/* ===== RENDER ROUTER ===== */
function render(){
  const c=$('#content');
  const v=state.view;
  if(v==='overview') c.innerHTML=renderOverview();
  else if(v==='catalog'){ c.innerHTML=renderCatalogFrame(); paintCatalog(); }
  else if(v==='product') c.innerHTML=renderProduct();
  else if(v==='margins') c.innerHTML=renderMargins();
  else if(v==='suppliers') c.innerHTML=renderSuppliers();
  else if(v==='activity') c.innerHTML=renderActivity();
  else if(v==='settings') c.innerHTML=renderSettings();
}

function visibleProducts(){
  let list=PRODUCTS.slice();
  const c=state.catalog;
  if(c.tab==='published') list=list.filter(p=>p.published);
  else if(c.tab==='hidden') list=list.filter(p=>!p.published);
  if(c.category!=='all') list=list.filter(p=>p.category===c.category);
  if(c.search){ const q=c.search.toLowerCase(); list=list.filter(p=>(p.title+' '+p.sku).toLowerCase().includes(q)); }
  list.sort((a,b)=>{
    let av,bv;
    if(c.sortKey==='cost'){av=a.cost;bv=b.cost;}
    else if(c.sortKey==='price'){av=finalPrice(a);bv=finalPrice(b);}
    else{av=a.title.toLowerCase();bv=b.title.toLowerCase();}
    if(av<bv) return c.sortDir==='asc'?-1:1;
    if(av>bv) return c.sortDir==='asc'?1:-1;
    return 0;
  });
  return list;
}
function paintCatalog(){
  const body=$('#catalogBody'); if(!body) return;
  const list=visibleProducts();
  const c=state.catalog;
  const visIds=list.map(p=>p.id);
  const selVisible=visIds.filter(id=>c.selected.has(id));
  const allSel=list.length>0 && selVisible.length===list.length;
  const partSel=selVisible.length>0 && !allSel;

  let bulk='';
  if(c.selected.size>0){
    bulk=`<div class="bulk-bar">
      <span class="cbx ${allSel?'checked':partSel?'partial':''}" onclick="toggleSelectAll()">${allSel?ICO_CHECK:partSel?ICO_DASH:''}</span>
      <span class="bulk-count">${c.selected.size} selected</span>
      <div class="bulk-actions">
        <button class="btn btn-sm btn-secondary" onclick="bulkPublish(true)">Publish</button>
        <button class="btn btn-sm btn-secondary" onclick="bulkPublish(false)">Hide</button>
        <button class="btn btn-sm btn-secondary" onclick="openBulkMargin()">Set margin</button>
        <button class="btn btn-sm btn-plain" onclick="clearSelection()">Deselect</button>
      </div>
    </div>`;
  }

  if(list.length===0){
    body.innerHTML=bulk+`<div class="empty-state"><div class="ico">${ICO_BOX}</div><h3>No products found</h3><p>No products match your current filters. Try a different search or category.</p><button class="btn btn-secondary" onclick="clearFilters()">Clear filters</button></div>`;
    return;
  }

  const sortInd=k=> c.sortKey===k ? (c.sortDir==='asc'?ICO_SORT_UP:ICO_SORT_DOWN) : ICO_SORT_DOWN;
  const sortCls=k=> 'sortable'+(c.sortKey===k?' active':'');

  body.innerHTML=bulk+`
    <table class="p-table">
      <thead>
        <tr>
          <th class="col-check"><span class="cbx ${allSel?'checked':partSel?'partial':''}" onclick="toggleSelectAll()">${allSel?ICO_CHECK:partSel?ICO_DASH:''}</span></th>
          <th class="${sortCls('title')}" onclick="catalogSort('title')">Product<span class="sort-ind">${sortInd('title')}</span></th>
          <th>Specs</th>
          <th class="cell-right ${sortCls('cost')}" onclick="catalogSort('cost')">Supplier cost<span class="sort-ind">${sortInd('cost')}</span></th>
          <th class="cell-center">Margin</th>
          <th class="cell-right ${sortCls('price')}" onclick="catalogSort('price')">Store price<span class="sort-ind">${sortInd('price')}</span></th>
          <th class="cell-center">Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${list.map(p=>catalogRow(p)).join('')}</tbody>
    </table>
    <div class="p-card-foot"><button class="btn btn-sm btn-secondary" disabled>Previous</button><span class="cost-muted" style="font-size:12px;padding:0 8px">Showing ${list.length} of ${PRODUCTS.length}</span><button class="btn btn-sm btn-secondary" disabled>Next</button></div>
    <div class="p-card-section" style="padding-top:14px;border-top:1px solid var(--hairline)"><div class="muted-note" style="margin:0">${ICO_LOCK}<span><span class="confidential-pill">${ICO_LOCK} Internal only</span> &nbsp;Supplier cost and margin never reach the storefront — customers see the store price only.</span></div></div>`;
}
function catalogRow(p){
  const sel=state.catalog.selected.has(p.id);
  const noImg=!p.img;
  return `
  <tr class="row-hover ${sel?'selected':''}">
    <td class="col-check"><span class="cbx ${sel?'checked':''}" onclick="toggleRow('${p.id}')">${sel?ICO_CHECK:''}</span></td>
    <td onclick="openProduct('${p.id}')"><div class="prod-cell">${thumb(p)}<div><div class="prod-title link">${esc(p.title)}</div><div class="prod-meta">${p.variant} · ${p.sku}</div></div></div></td>
    <td onclick="openProduct('${p.id}')"><div class="prod-meta" style="margin:0">${p.weight} · ${p.karat}</div><div class="prod-meta" style="margin-top:2px">Stock: ${p.stock}</div></td>

    <td class="cell-center"><button class="badge ${p.override?'badge-blue':'badge-grey'}" title="${effectiveMargin(p).source}" onclick="openMarginModal('${p.id}')">${marginLabel(p)}</button></td>

    <td class="cell-center">${statusBadge(p)}${noImg?`<div class="prod-meta" style="margin-top:4px;color:#9e6c00">${ICO_WARN} No image</div>`:''}</td>

function statusBadge(p){

function thumb(p){
  if(p.img) return `<img class="prod-thumb" src="${p.img}" alt="${esc(p.title)}">`;

  state.catalog.tab=t;

function bulkMarginCtrl(){
  const d=bulkMarginDraft;
  return `

window.setBulkType=function(t){ bulkMarginDraft.type=t; $('#bulkMarginCtrl').innerHTML=bulkMarginCtrl(); };
window.bulkMarginDraftVal=function(v){ const n=parseFloat(v); if(!isNaN(n)) bulkMarginDraft.val=n; };
window.applyBulkMargin=function(){
  const d=bulkMarginDraft;
  if(isNaN(d.val)||d.val<0){ showToast('Enter a valid margin value','error'); return; }
  const s=state.catalog.selected; let n=0;
  PRODUCTS.forEach(p=>{ if(s.has(p.id)){ p.override=true; p.mType=d.type; p.mVal=d.val; n++; } });

let mDraft=null;
window.openMarginModal=function(id){
  closePopover();
  const p=PRODUCTS.find(x=>x.id===id); if(!p) return;
  const m=effectiveMargin(p);
  mDraft={id:id, override:p.override, type:p.override?p.mType:m.type, val:p.override?p.mVal:m.val};
  openModal(buildMarginModal(p));
};
function buildMarginModal(p){
  return `
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Margin · ${esc(p.title)}</span><button class="modal-close" onclick="closeModal()">${ICO_X}</button></div>
      <div class="modal-body">
        <div class="conn-card" style="border:none;padding:0;margin-bottom:16px">${thumb(p)}<div class="conn-info"><div class="conn-name" style="font-size:13px">${p.variant}</div><div class="conn-meta">${p.sku} · ${p.weight}</div></div></div>
        <div id="marginModalBody">${marginModalInner(p)}</div>
      </div>
      <div class="modal-foot" id="marginModalFoot">${marginFootInner(p)}</div>
    </div>`;
}
function marginFootInner(p){
  return `${mDraft.override? `<button class="btn-plain" onclick="clearOverride('${p.id}')">Use ${p.category} category rule instead</button>`:''}<div class="right"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveMargin('${p.id}')">Save margin</button></div>`;
}
function marginModalInner(p){
  const d=mDraft;
  const srcNote = d.override
    ? `<div class="banner banner-info" style="margin-bottom:16px"><div class="ico">${ICO_TAG}</div><div class="txt"><div class="ttl">Custom margin for this product</div><div class="sub">Overrides the ${p.category} category rule and global default.</div></div></div>`
    : `<div class="banner banner-info" style="margin-bottom:16px"><div class="ico">${ICO_TAG}</div><div class="txt"><div class="ttl">Using ${effectiveMargin(p).source}</div><div class="sub">Edit below to set a custom margin just for this product.</div></div></div>`;
  const fp=priceFrom(p.cost,d.type,d.val||0);
  return `
    ${srcNote}
    <label class="field-label">Margin type</label>
    <div class="seg" style="margin-bottom:14px">
      <button class="${d.type==='pct'?'active':''}" onclick="setMarginType('${p.id}','pct')">Percentage</button>
      <button class="${d.type==='fixed'?'active':''}" onclick="setMarginType('${p.id}','fixed')">Fixed amount</button>
    </div>
    <label class="field-label">Margin value<span class="req">*</span></label>
    <div class="input-prefix ${d.type==='pct'?'has-suffix':''}" style="width:160px;margin-bottom:16px">
      ${d.type==='pct'?'':'<span class="prefix">$</span>'}
      <input class="input tabular" id="marginInput" value="${d.val}" oninput="marginPreview('${p.id}',this.value)" style="${d.type==='pct'?'padding-left:10px':''}">
      ${d.type==='pct'?'<span class="suffix">%</span>':''}
    </div>
    <div class="p-card" style="margin:0;background:#fafafa">
      <div class="p-card-section">
        <div class="kv"><span class="k">Supplier cost</span><span class="v tabular">${fmt(p.cost)}</span></div>
        <div class="kv"><span class="k">Margin <span class="confidential-pill">${ICO_LOCK} Internal</span></span><span class="v tabular margin-pos" id="mAmt">+${fmt(fp-p.cost)}</span></div>
        <div class="kv"><span class="k" style="font-weight:600;color:#1a1a1a">Store price</span><span class="v price-blue tabular" id="mFinal">${fmt(fp)}</span></div>
      </div>
    </div>
    <div class="muted-note">${ICO_LOCK}<span>Customers only ever see the store price.</span></div>`;
}
window.setMarginType=function(id,t){ mDraft.type=t; mDraft.override=true; const p=PRODUCTS.find(x=>x.id===id); $('#marginModalBody').innerHTML=marginModalInner(p); $('#marginModalFoot').innerHTML=marginFootInner(p); };
window.marginPreview=function(id,v){
  const n=parseFloat(v); mDraft.val=isNaN(n)?'':n; mDraft.override=true;
  const p=PRODUCTS.find(x=>x.id===id);
  const fp=priceFrom(p.cost,mDraft.type, isNaN(n)?0:n);
  const a=$('#mAmt'), f=$('#mFinal'); if(a) a.textContent='+'+fmt(fp-p.cost); if(f) f.textContent=fmt(fp);
};
window.clearOverride=function(id){
  const p=PRODUCTS.find(x=>x.id===id); if(!p) return;
  p.override=false;
  closeModal(); showToast('Reverted to '+effectiveMargin(p).source,'success');
  if(state.view==='product') render(); else paintCatalog();
};
window.saveMargin=function(id){
  const p=PRODUCTS.find(x=>x.id===id); if(!p) return;
  const n=parseFloat($('#marginInput').value);
  if(isNaN(n)||n<0){ showToast('Enter a valid margin value','error'); return; }
  p.override=true; p.mType=mDraft.type; p.mVal=n;
  closeModal(); showToast('Margin updated','success');
  if(state.view==='product') render(); else paintCatalog();
};

window.addCatRule=function(){
  const used=state.categoryRules.map(r=>r.cat);
  const avail=['Rope','Franco','Cuban','Box','Figaro'].filter(c=>!used.includes(c));

  state.categoryRules.push({cat:cat,type:'pct',val:10});
  $('#catRules').innerHTML=catRulesHtml(); $('#marginPreview').innerHTML=marginPreviewHtml();
  setDirty(true,'Margin rules changed'); showToast(cat+' rule added','success');
};

      ${filtered.length? filtered.map(l=>{
        const cls=l.type==='ok'?'ok':l.type==='warn'?'warn':'err';
        const ic=l.type==='ok'?ICO_OK:l.type==='warn'?ICO_WARN:ICO_ERR;
        return `<div class="log-row"><div class="log-ico ${cls}">${ic}</div><div class="log-main"><div class="log-title">${l.title}</div><div class="log-meta">${l.meta}</div></div><div class="log-time">${l.time}</div></div>`;
      }).join('') : `<div class="empty-state" style="padding:32px"><div class="ico">${ICO_OK}</div><h3>Nothing here</h3><p>No ${f} entries in the recent activity window.</p></div>`}
    </div>
  </div>`;
}

          <div class="kv"><span class="k">Schedule</span><span class="v">Every ${s.schedule} min</span></div>

          <div class="kv"><span class="k">Suppliers</span><span class="v">${SUPPLIERS.length} connected</span></div>

/* ===== IMPORT MODAL ===== */
window.openImportModal=function(){
  closePopover();
  state.importSel=new Set(PRODUCTS.filter(p=>p.published).map(p=>p.id));
  state.importSearch=''; state.importCat='all';
  openModal(`
    <div class="modal modal-lg">
      <div class="modal-header"><span class="modal-title">Import products from Gold Supply</span><button class="modal-close" onclick="closeModal()">${ICO_X}</button></div>
      <div class="modal-body">
        <div class="rp-toolbar">
          <div class="input-search" style="flex:1">${ICO_SEARCH}<input class="input" id="importSearchInput" placeholder="Search supplier catalog" oninput="importSearch(this.value)"></div>
          <select class="select" style="width:150px" onchange="importCat(this.value)">
            <option value="all">All categories</option><option value="Rope">Rope</option><option value="Franco">Franco</option><option value="Cuban">Cuban</option>
          </select>
        </div>
        <div class="rp-head">
          <span><span class="cbx" id="importSelAll" onclick="importToggleAll()"></span></span>
          <span>Product</span><span class="cell-right">Cost</span><span class="cell-right">Store price</span>
        </div>
        <div id="importRows"></div>
      </div>
      <div class="modal-foot">
        <span class="cost-muted" style="font-size:12px" id="importCount"></span>
        <div class="right"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="confirmImport()">Publish selected</button></div>
      </div>
    </div>`);
  paintImport();
};
function importVisible(){
  let list=PRODUCTS.slice();
  if(state.importCat!=='all') list=list.filter(p=>p.category===state.importCat);
  if(state.importSearch){ const q=state.importSearch.toLowerCase(); list=list.filter(p=>(p.title+' '+p.sku).toLowerCase().includes(q)); }
  return list;
}
function paintImport(){
  const wrap=$('#importRows'); if(!wrap) return;
  const list=importVisible();
  if(list.length===0){ wrap.innerHTML=`<div class="empty-state" style="padding:28px"><div class="ico">${ICO_BOX}</div><h3>No products found</h3><p>Try a different search or category.</p></div>`; }
  else wrap.innerHTML=list.map(p=>importRow(p)).join('');
  const visSel=list.filter(p=>state.importSel.has(p.id)).length;
  const allEl=$('#importSelAll');
  if(allEl){ allEl.className='cbx '+(list.length>0&&visSel===list.length?'checked':visSel>0?'partial':''); allEl.innerHTML=(list.length>0&&visSel===list.length)?ICO_CHECK:visSel>0?ICO_DASH:''; }
  const cnt=$('#importCount'); if(cnt) cnt.textContent=state.importSel.size+' of '+PRODUCTS.length+' products selected';
}
function importRow(p){
  const sel=state.importSel.has(p.id);
  return `<div class="rp-row ${sel?'sel':''}" onclick="importToggle('${p.id}')">
    <span><span class="cbx ${sel?'checked':''}">${sel?ICO_CHECK:''}</span></span>
    <span class="rp-prod">${thumb(p)}<div><div class="prod-title">${esc(p.title)}</div><div class="prod-meta">${p.variant} · ${p.sku}</div></div></span>
    <span class="cell-right cost-muted tabular">${fmt(p.cost)}</span>
    <span class="cell-right price-blue tabular">${fmt(finalPrice(p))}</span>
  </div>`;
}
window.importToggle=function(id){ const s=state.importSel; if(s.has(id)) s.delete(id); else s.add(id); paintImport(); };
window.importToggleAll=function(){
  const list=importVisible(); const s=state.importSel;
  const allSel=list.every(p=>s.has(p.id));
  if(allSel) list.forEach(p=>s.delete(p.id)); else list.forEach(p=>s.add(p.id));
  paintImport();
};
window.importSearch=function(v){ state.importSearch=v; paintImport(); };
window.importCat=function(v){ state.importCat=v; paintImport(); };
window.confirmImport=function(){
  PRODUCTS.forEach(p=>{ p.published=state.importSel.has(p.id); });
  closeModal(); showToast(state.importSel.size+' products set to publish','success');
  if(state.view==='catalog') paintCatalog(); else render();
};

/* ===== POPOVERS ===== */
function openActionMenu(anchor, items){
  closePopover();
  const pop=document.createElement('div');
  pop.className='popover'; pop.id='activePopover';
  items.forEach(it=>{
    if(it.divider){ const d=document.createElement('div'); d.className='popover-divider'; pop.appendChild(d); return; }
    if(it.header){ const l=document.createElement('div'); l.className='popover-label'; l.textContent=it.label; pop.appendChild(l); return; }
    const b=document.createElement('button');
    b.className='action-item'+(it.destructive?' destructive':'')+(it.checked?' checked-item':'');
    b.innerHTML=(it.icon||'')+'<span>'+it.label+'</span>'+(it.checked?ICO_CHECK_BLUE:'');
    b.addEventListener('click',function(ev){ ev.stopPropagation(); closePopover(); if(it.onClick) it.onClick(); });
    pop.appendChild(b);
  });
  document.body.appendChild(pop);
  positionPopover(pop, anchor);
  setTimeout(()=>document.addEventListener('click', outsideClose),0);
}
function positionPopover(pop, anchor){
  const r=anchor.getBoundingClientRect();
  const pw=pop.offsetWidth, ph=pop.offsetHeight;
  let left=r.right-pw; if(left<8) left=8; if(left+pw>window.innerWidth-8) left=window.innerWidth-pw-8;
  let top=r.bottom+6; if(top+ph>window.innerHeight-8) top=Math.max(8,r.top-ph-6);
  pop.style.left=left+'px'; pop.style.top=top+'px';
}
function outsideClose(e){ const pop=$('#activePopover'); if(pop && !pop.contains(e.target)) closePopover(); }
function closePopover(){ const pop=$('#activePopover'); if(pop) pop.remove(); document.removeEventListener('click', outsideClose); }

/* ===== MODAL + TOAST ===== */
window.openModal=function(html){ closePopover(); $('#modalHost').innerHTML=html; $('#modalBackdrop').classList.add('open'); };
window.closeModal=function(){ $('#modalBackdrop').classList.remove('open'); $('#modalHost').innerHTML=''; };
$('#modalBackdrop').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closePopover(); closeModal(); } });

window.showToast=function(msg,type){
  type=type||'success';
  const t=document.createElement('div');
  t.className='toast toast-'+type;
  t.innerHTML='<span>'+msg+'</span>';
  $('#toastWrap').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); },2800);
};
